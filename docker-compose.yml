services:

  # ─── Base de datos ────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: drivecheck-db
    environment:
      POSTGRES_USER: drivecheck
      POSTGRES_PASSWORD: drivecheck123
      POSTGRES_DB: drivecheck_db
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivecheck -d drivecheck_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────────
  backend-api:
    build: ./backend-api
    container_name: drivecheck-backend-api
    environment:
      DATABASE_URL: postgresql://drivecheck:drivecheck123@db:5432/drivecheck_db
      BACKEND_IA_URL: http://backend-ia:8001
    volumes:
      - storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Backend IA ───────────────────────────────────────────────────
  backend-ia:
    build: ./backend-ia
    container_name: drivecheck-backend-ia
    environment:
      DATABASE_URL: postgresql://drivecheck:drivecheck123@db:5432/drivecheck_db
      BACKEND_API_URL: http://backend-api:8000
    volumes:
      - storage:/storage
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend ─────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: drivecheck-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend-api

# ─── Volúmenes ──────────────────────────────────────────────────────
volumes:
  db-data:      # datos persistentes de PostgreSQL
  storage:      # clips de video y reportes compartidos entre backend-api y backend-ia
